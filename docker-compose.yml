version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: threatlens_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: threatlens
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: threatlens_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: